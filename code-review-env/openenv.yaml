name: code-review-env
version: "1.0"
description: >
  A reinforcement learning environment for LLM-based code review agents.
  The agent reviews code snippets, identifies bugs, and receives rewards
  based on accuracy, efficiency, and decision quality.

environment:
  entry_point: env.environment:CodeReviewEnv

action_space:
  - flag_bug
  - suggest_fix
  - approve

observation_fields:
  - code
  - found_bugs
  - fixed_lines
  - steps_remaining

tasks:
  easy:
    module: tasks.easy
    export: EASY_TASKS
    description: Syntax error detection tasks
  medium:
    module: tasks.medium
    export: MEDIUM_TASKS
    description: Logical bug detection tasks
  hard:
    module: tasks.hard
    export: HARD_TASKS
    description: Performance issue detection tasks

rewards:
  correct_bug_found: 1.0
  wrong_bug_flagged: -0.3
  missed_bug_penalty: -0.5
  correct_fix_bonus: 0.5
  approve_clean_code: 0.5
  false_positive_penalty: -0.4
  step_penalty: -0.01

grader:
  module: grader.grader
  export: Grader
  weights:
    bug_detection: 0.4
    false_positive: 0.2
    efficiency: 0.2
    decision_quality: 0.2

inference:
  script: inference.py
  default_model: gpt-4o
  supported_models:
    - gpt-4o
    - gpt-4-turbo
    - claude-3-5-sonnet
    - gemini-1.5-pro